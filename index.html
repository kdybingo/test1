<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 어디서 봐? - 지도 테스트</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        /* 지도를 담을 박스 스타일 */
        #map { width: 100%; height: 350px; margin-top: 20px; border-radius: 10px; display: none; } 
    </style>
</head>
<body>
    <div class="container">
        <h1>📍 우리 어디서 봐?</h1>
        <p>각자의 근처 역을 입력하세요!</p>
        <input type="text" id="p1" placeholder="친구 1의 역 (예: 강남역)">
        <input type="text" id="p2" placeholder="친구 2의 역 (예: 홍대입구역)">
        <input type="text" id="p3" placeholder="친구 3의 역 (예: 신촌역)">
        <br>
        <button onclick="showMap()">중간 지점 찾기 (지도 보기)</button>
        
        <!-- 지도가 그려질 공간 -->
        <div id="map"></div>
    </div>

    <!-- 카카오 지도 API 불러오기 (여기에 다윤님의 키를 넣으세요!) -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=88c468682136269d91704dab7d1b2763"></script>

    <script>
        function showMap() {
            const p1 = document.getElementById('p1').value;
            const p2 = document.getElementById('p2').value;
            const p3 = document.getElementById('p3').value;

            if(!p1 || !p2 || !p3) {
                alert('모든 역을 입력해주세요!');
                return;
            }

            // 지도 영역을 보이게 만들기
            document.getElementById('map').style.display = 'block';

            // 지도 생성 준비
            var mapContainer = document.getElementById('map'), // 지도를 표시할 div 
                mapOption = { 
                    center: new kakao.maps.LatLng(37.566826, 126.978656), // 일단 서울시청 좌표로 띄웁니다
                    level: 7 // 지도의 확대 레벨
                };

            // 지도를 생성합니다
            var map = new kakao.maps.Map(mapContainer, mapOption); 
            
            // 나중에 여기에 '진짜 중간 좌표를 계산해서 지도를 이동시키는 코드'를 추가할 거예요!
        }
    </script>
</body>
</html>
