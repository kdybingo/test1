<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 어디서 봐? - 정석 버전</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 85%; margin-top: 10px; }
        /* 지도가 그려질 박스 (정석대로 처음부터 고정 크기로 띄워둡니다) */
        #map { width: 100%; height: 350px; margin-top: 20px; border-radius: 10px; border: 1px solid #ccc; } 
    </style>
</head>
<body>
    <div class="container">
        <h1>📍 우리 어디서 봐?</h1>
        <p>각자의 근처 역을 입력하세요!</p>
        <input type="text" id="p1" placeholder="친구 1의 역 (예: 강남역)">
        <input type="text" id="p2" placeholder="친구 2의 역 (예: 홍대입구역)">
        <input type="text" id="p3" placeholder="친구 3의 역 (예: 신촌역)">
        <button onclick="searchMeetingPoint()">중간 지점 찾기</button>
        
        <!-- 지도가 그려질 공간 -->
        <div id="map"></div>
    </div>

    <!-- [1] 카카오 지도 라이브러리 로드 (정석 스트레이트 방식) -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=88c468682136269d91704dab7d1b2763"></script>

    <!-- [2] 지도 실행 스크립트 -->
    <script>
        // 페이지가 열리자마자 바로 서울시청 중심으로 지도 초기화
        var mapContainer = document.getElementById('map'); 
        var mapOption = { 
            center: new kakao.maps.LatLng(37.566826, 126.978656), // 서울시청 좌표
            level: 4 // 지도 확대 레벨
        };

        // 카카오 지도 객체 생성
        var map = new kakao.maps.Map(mapContainer, mapOption); 

        // 버튼 클릭 시 실행될 함수
        function searchMeetingPoint() {
            const p1 = document.getElementById('p1').value;
            const p2 = document.getElementById('p2').value;
            const p3 = document.getElementById('p3').value;

            if(!p1 || !p2 || !p3) {
                alert('모든 역을 입력해주세요!');
                return;
            }

            // 테스트용: 버튼 누르면 강남역으로 부드럽게 지도 이동
            var moveLatLon = new kakao.maps.LatLng(37.4979, 127.0276);
            map.panTo(moveLatLon); 
            
            alert('입력 완료! 정석대로 지도를 강남역으로 이동시킵니다.');
        }
    </script>
</body>
</html>
